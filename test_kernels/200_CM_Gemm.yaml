# Spec for the naive CM GEMM seed kernel: D = A @ B
# A: [M, K] bf16, B: [K, N] bf16, D: [M, N] fp32.
inputs:
  A:
    shape: [M, K]
    dtype: bfloat16
  B:
    shape: [K, N]
    dtype: bfloat16

ci:
  - params: [A, B]
    dims:
      M: 256
      N: 256
      K: 256
    flop: "2*M*N*K"

bench-xpu:
  - params: [A, B]
    dims:
      M: 4096
      N: 4096
      K: 4096
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dims:
      M: 4096
      N: 4096
      K: 4096
    flop: "2*M*N*K"
