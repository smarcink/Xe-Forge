# Correctness Constraints — generic (applies to Triton, SYCL, and all XPU kernels)
#
# Triton-specific constraints are in knowledge_base/triton/xpu/correctness.yaml

constraints:
- id: outputs_must_match
  name: Outputs must match original
  severity: info
  description: 'The verification tool will check that outputs match the original.

    If it fails, try a different optimization approach.

    '
- id: kernel_launch_must_use_device_moved_tensors
  name: Always pass device-moved tensor variables to kernel launch, not original args
  severity: critical
  description: 'When kernel_function() creates local copies (x_xpu, b_xpu, wt_xpu) to move

    tensors to XPU, the kernel launch MUST use those copies — not the original

    argument names (x, bias, weight_t). Passing originals silently feeds CPU

    tensors to the XPU kernel, causing "Expected all tensors to be on the same

    device" errors at runtime.


    WRONG:

    ```python

    x_xpu  = x.to("xpu", dtype=torch.float16).contiguous()

    b_xpu  = bias.to("xpu", dtype=torch.float32).contiguous()

    _kernel[grid](x, b_xpu, ...)          # x is still CPU!

    ```


    CORRECT:

    ```python

    x_xpu  = x.to("xpu", dtype=torch.float16).contiguous()

    b_xpu  = bias.to("xpu", dtype=torch.float32).contiguous()

    _kernel[grid](x_xpu, b_xpu, ...)      # all tensors on XPU

    ```


    Also applies to strides: use x_xpu.stride(0) not x.stride(0) after the copy.

    '
- id: forward_must_move_x_to_xpu_before_dtype_cast
  name: Move tensor to XPU and cast dtype in one call to avoid CPU intermediate
  severity: warning
  description: "In forward(), always move to device AND cast dtype in a single .to() call.\nSplitting into two operations\
    \ creates a CPU intermediate of the wrong dtype.\n\nWRONG:\n```python\nif x.dtype != torch.float16:\n    x = x.to(dtype=torch.float16)\
    \       # stays on CPU as fp16!\nif x.device.type != \"xpu\":\n    x = x.to(\"xpu\")                     # now moves,\
    \ but wasteful\n```\n\nCORRECT:\n```python\nif x.device.type != \"xpu\" or x.dtype != torch.float16:\n    x = x.to(\"\
    xpu\", dtype=torch.float16)\n```\n"
- id: model_forward_must_not_rely_on_model_to_for_device
  name: forward() must not assume model.to(device) was called; move tensors explicitly
  severity: critical
  description: "KernelBench and similar frameworks may not call model.to(\"xpu\") before\nforward(). Always move self.weight,\
    \ self.bias, and input x to XPU\nexplicitly in forward() or in a lazy init method called from forward().\n\nWRONG:\n```python\n\
    def forward(self, x):\n    # assumes model.to(\"xpu\") was called — not safe in KernelBench\n    return kernel_function(x,\
    \ self.weight, self.bias)\n```\n\nCORRECT:\n```python\ndef forward(self, x):\n    if x.device.type != \"xpu\" or x.dtype\
    \ != torch.float16:\n        x = x.to(\"xpu\", dtype=torch.float16)\n    if self.weight.device.type != \"xpu\":\n    \
    \    self.weight.data = self.weight.data.to(\"xpu\", dtype=torch.float16).contiguous()\n    return kernel_function(x,\
    \ self.weight, self.bias)\n```\n"
- id: no_cpu_return_from_xpu_kernel
  name: kernel_function must NOT return a CPU tensor — output must stay on XPU
  severity: critical
  description: 'kernel_function and forward() must return tensors on XPU, not CPU.

    The executor expects XPU output and will raise a device mismatch error

    if a CPU tensor is returned.


    NOTE: tensor.xpu() IS a valid PyTorch method (moves tensor to XPU,

    equivalent to tensor.to(''xpu'')). It is tensor.cpu() in a return

    statement that is wrong here.


    WRONG:

    ```python

    return y.cpu()   # moves output to CPU — executor expects XPU

    ```


    CORRECT:

    ```python

    return y          # already on XPU, no move needed

    # or if needed: return y.to(''xpu'')  # same as y.xpu()

    # or, if dtype conversion also needed:

    return y.to(torch.float32).cpu()

    ```'
