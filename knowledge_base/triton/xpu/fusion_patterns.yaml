# Kernel Fusion Patterns for Intel XPU
# Fusion can reduce memory traffic by eliminating intermediate writes/reads,
# but it can also hurt due to GRF/register pressure, reduced occupancy.
#
# Guidance:
# - Fuse bandwidth-bound elementwise chains aggressively (usually a win).
# - Be cautious fusing into GEMM unless you already need a custom GEMM.
# - Do NOT fuse if the intermediate is not materialized or dead/redundant.

constraints:
  - id: fuse_only_if_intermediate_is_materialized
    name: "Fuse only if it removes a materialized intermediate that is otherwise written/read"
    severity: critical
    description: |
      Fusion is beneficial only if the unfused baseline materializes an intermediate tensor
      (stores it to memory) and then reloads it in a separate kernel.

      If the intermediate is already:
      - handled by a fused library epilogue, OR
      - kept in registers within a single kernel, OR
      - dead / provably redundant for the workload,
      then fusion provides little/no benefit and may harm performance.

  - id: prefer_fused_gemm_with_epilogue
    name: "Prefer fused GEMM with epilogue over separate kernels"
    severity: critical
    description: |
      When a GEMM is followed by a small epilogue (e.g., ReLU, bias add, clamp),
      fuse the epilogue into the GEMM kernel by applying it on the accumulator
      in registers before the final tl.store. This eliminates an extra read+write
      of the full output tensor.

      However, if the epilogue is very complex (e.g., GroupNorm, BatchNorm with
      running stats, reductions across spatial dims), keep it as a separate kernel
      to avoid register pressure collapse.

  - id: nhwc_spatially_tiled_conv_with_block_ptr
    name: "Spatially-tiled NHWC convolution using block_ptr and fused epilogue"
    severity: critical
    description: |
      For convolution kernels, use NHWC (channels_last) layout with SPATIAL TILING
      and ALL operands via tl.make_block_ptr. This is the only Triton conv pattern
      that reliably maps to DPAS on Intel XPU.

      There are THREE things that must ALL be correct:

      1. NHWC LAYOUT — C must be the contiguous (stride=1) dimension.
         Convert once: x.to(memory_format=torch.channels_last)
         Weight packed as HWIO: weight.permute(2, 3, 1, 0).contiguous()

      2. SPATIAL TILING — grid is (n, oh, ow_tile * cout_tile), NOT flat M.
         Preserving (n, oh) in the grid ensures that within each tile,
         output pixels along ow are consecutive in NHWC flat (N*H*W, C) view.
         This makes x loads a regular 2D block — enabling block_ptr.
         Flattening M = N*OH*OW DESTROYS this — adjacent M indices cross
         oh/batch boundaries, forcing scatter loads that break DPAS.

      3. ALL OPERANDS USE block_ptr (x, w, y) — tl.make_block_ptr generates
         Intel 2D block load/store instructions (SubgroupBlockReadINTEL).
         This replaces ALL scatter/gather with structured block transfers.

      WRONG patterns (all break DPAS):
      - NCHW direct conv: C not contiguous, no GEMM possible
      - im2col: flattens K_h*K_w*C_in, scatter-gather indices → scalar FMA fallback
      - Flat M tiling: M=N*OH*OW with pointer arithmetic → scatter x loads

      CORRECT pattern — spatially-tiled NHWC conv:
      ```python
      @triton.jit
      def _conv2d_spatial_tiled(
          x_ptr, w_ptr, bias_ptr, y_ptr,
          N_batch, H, W, C_out, OH, OW,
          stride_wkh, stride_wkw, stride_wci, stride_wco,
          BLOCK_OW: tl.constexpr, BLOCK_N: tl.constexpr, BLOCK_K: tl.constexpr,
          KH: tl.constexpr, KW: tl.constexpr, C_IN: tl.constexpr,
      ):
          n = tl.program_id(0)
          oh = tl.program_id(1)
          pid_ow_n = tl.program_id(2)  # combined ow_tile and cout_tile

          num_ow_tiles = tl.cdiv(OW, BLOCK_OW)
          pid_ow = pid_ow_n % num_ow_tiles
          pid_n = pid_ow_n // num_ow_tiles
          ow0 = pid_ow * BLOCK_OW
          HW = H * W

          acc = tl.zeros((BLOCK_OW, BLOCK_N), dtype=tl.float32)

          # K_h × K_w small GEMMs — each on contiguous NHWC data
          for kh in range(KH):
              for kw in range(KW):
                  # x rows: consecutive in flat (N*H*W, C_IN) view
                  x_row_start = n * HW + (oh + kh) * W + (ow0 + kw)
                  x_valid_rows = W - (ow0 + kw)  # boundary limit

                  x_bp = tl.make_block_ptr(
                      base=x_ptr,
                      shape=(x_row_start + x_valid_rows, C_IN),
                      strides=(C_IN, 1),  # C is contiguous!
                      offsets=(x_row_start, 0),
                      block_shape=(BLOCK_OW, BLOCK_K),
                      order=(1, 0),
                  )
                  w_bp = tl.make_block_ptr(
                      base=w_ptr + kh * stride_wkh + kw * stride_wkw,
                      shape=(C_IN, C_out),
                      strides=(stride_wci, stride_wco),
                      offsets=(0, pid_n * BLOCK_N),
                      block_shape=(BLOCK_K, BLOCK_N),
                      order=(1, 0),
                  )
                  for c0 in range(0, C_IN, BLOCK_K):
                      x_tile = tl.load(x_bp, boundary_check=(0,1), padding_option="zero")
                      w_tile = tl.load(w_bp, boundary_check=(0,1), padding_option="zero")
                      acc = tl.dot(x_tile, w_tile, acc)  # → DPAS
                      x_bp = tl.advance(x_bp, (0, BLOCK_K))
                      w_bp = tl.advance(w_bp, (BLOCK_K, 0))

          # Fused epilogue — all in registers, zero extra memory traffic
          offs_n = pid_n * BLOCK_N + tl.arange(0, BLOCK_N)
          acc += tl.load(bias_ptr + offs_n, mask=offs_n < C_out, other=0.0)[None, :]
          acc = tl.maximum(acc, 0.0)  # relu or other activations

          # Store with boundary-limited shape to prevent oh-row wrapping
          y_row_start = n * (OH * OW) + oh * OW + ow0
          y_valid_rows = OW - ow0
          y_bp = tl.make_block_ptr(
              base=y_ptr,
              shape=(y_row_start + y_valid_rows, C_out),
              strides=(C_out, 1),
              offsets=(y_row_start, pid_n * BLOCK_N),
              block_shape=(BLOCK_OW, BLOCK_N),
              order=(1, 0),
          )
          tl.store(y_bp, acc.to(tl.float16), boundary_check=(0, 1))
      ```

      Grid function:
      ```python
      def grid(meta):
          num_ow = triton.cdiv(OW, meta['BLOCK_OW'])
          num_n = triton.cdiv(C_out, meta['BLOCK_N'])
          return (N, OH, num_ow * num_n)
      ```

      Wrapper preparation (do ONCE in __init__, not per forward):
      ```python
      x_cl = x.to(memory_format=torch.channels_last)
      x_nhwc = x_cl.permute(0, 2, 3, 1)  # contiguous NHWC view, no copy
      w_hwio = weight.permute(2, 3, 1, 0).contiguous()  # [KH, KW, C_in, C_out]
      y_cl = torch.empty(..., memory_format=torch.channels_last)
      y_nhwc = y_cl.permute(0, 2, 3, 1)
      ```

      Key requirements:
      - BLOCK_K must be multiple of 16 (DPAS alignment)
      - C_IN as tl.constexpr when possible (unrolls channel reduction loop)
      - Boundary-limited shape on block_ptr prevents oh-row wrapping
      - Weight as HWIO (not OIHW) for direct per-(kh,kw) access
      - For Conv3d: add outer loop over K_d, use channels_last_3d,
        handle padding with conditional skip (d_ok, h_ok checks)
      - For padded convolutions: padding in d/h → conditional skip,
        padding in w → block_ptr boundary_check handles naturally
      - Pre-allocate output as channels_last, reuse across calls
      - Autotune BLOCK_OW, BLOCK_N, BLOCK_K, num_warps, num_stages

  - id: fuse_batchnorm_into_conv_epilogue
    name: "Fuse BatchNorm (eval mode) into conv epilogue as affine transform"
    severity: critical
    description: |
      For inference/eval mode, BatchNorm reduces to an affine transform:
        y = gamma * (x - mean) / sqrt(var + eps) + beta
          = x * (gamma / sqrt(var + eps)) + (beta - mean * gamma / sqrt(var + eps))
          = x * bn_scale + bn_bias

      Pre-compute bn_scale and bn_bias ONCE in __init__ or a lazy cache:
      ```python
      inv_std = torch.rsqrt(self.bn.running_var + self.bn.eps)
      bn_scale = (self.bn.weight * inv_std * self.scaling_factor).contiguous()
      bn_bias = (self.bn.bias - self.bn.running_mean * self.bn.weight * inv_std).contiguous()
      ```

      Then fuse into the conv epilogue as a single multiply-add on the accumulator:
      ```python
      # After conv accumulation, before tl.store:
      acc += conv_bias[None, :]          # conv bias
      acc = acc * bn_scale[None, :] + bn_bias[None, :]  # fused BN + scaling
      tl.store(y_bp, acc.to(tl.float16), ...)
      ```

      This eliminates a full read+write of the intermediate tensor between conv and BN.
      The bn_scale and bn_bias vectors are [C_out] — tiny, stay in registers.

  - id: use_conv_transpose_with_triton_epilogue
    name: "Use F.conv_transpose2d/3d with Triton epilogue for transposed convolutions"
    severity: critical
    description: |
      For ConvTranspose2d and ConvTranspose3d, the im2col GEMM relationship is inverted
      (scatter instead of gather), making a custom Triton spatial-tiled kernel much harder.
      The best approach is:
      1. Use F.conv_transpose2d / F.conv_transpose3d for the transposed conv
      2. Write a separate Triton elementwise kernel for the epilogue

      ```python
      def forward(self, x):
          y = F.conv_transpose2d(x, self.weight, self.bias, stride=2, padding=1, output_padding=1)
          return _triton_epilogue_kernel(y, ...)  # subtract, tanh, gelu, etc.
      ```

      Cache weight on XPU in __init__ to avoid per-call conversion.
      The epilogue kernel is a simple 1D elementwise kernel — use autotune for BLOCK_SIZE.

  - id: fusion_register_pressure_guard
    name: "Avoid fusion that causes GRF/register pressure collapse"
    severity: critical
    description: |
      Fusion increases live values and temporary tensors. If register pressure causes:
      - occupancy collapse, OR
      - GRF spills, OR
      - much lower parallelism,
      fusion can be slower than unfused.

      Red flags:
      - long activation chains with exp/log/tanh + multiple clamps
      - large tiles (e.g., 256x256) + high num_warps + many fused ops
      - reductions + heavy elementwise in same kernel on large blocks

      If unsure, fuse only a light epilogue (bias + simple activation) and keep the rest separate.

  - id: fuse_when_bandwidth_bound
    name: "Prefer fusion when the baseline is bandwidth-bound"
    severity: critical
    description: |
      Fusion helps most when the unfused path is bandwidth-bound:
      - elementwise chains (add/mul/clip/relu/etc.)
      - normalization epilogues (affine, bias, scale, clamp)
      - pointwise ops following reductions where intermediates are large

      Fusion helps least when:
      - compute-bound kernel dominates (large GEMM),
      - the intermediate is small,
      - or the baseline already uses a fused primitive.

  - id: skip_fusion_when_noop_or_redundant
    name: "Skip fusion when the operation is provably no-op or redundant"
    severity: critical
    description: |
      Do not fuse operations that are provably redundant for the workload:
      - multiply by 1, add 0
      - clamp/min/max where thresholds never trigger for the data range
      - dead outputs not consumed
      Extra fused instructions without reducing memory traffic can slow kernels down.

patterns:
  - id: elementwise_chain_fusion
    name: "Elementwise Chain Fusion (safe default)"
    stage: fusion
    description: "Fuse multiple elementwise ops into one kernel to reduce memory traffic"
    rationale: |
      Elementwise chains are typically bandwidth-bound. Each unfused step reads+writes the full
      tensor again. Fusion usually wins unless the chain is very large or involves heavy
      transcendentals that blow up register pressure.
    pattern_before: |
      y = a + b
      y = y * scale
      y = clamp(y, lo, hi)
      y = relu(y)
    pattern_after: |
      @triton.jit
      def fused_elementwise(a_ptr, b_ptr, out_ptr, ..., lo, hi, scale):
          x = tl.load(a_ptr + offsets, mask=mask, other=0.0)
          y = tl.load(b_ptr + offsets, mask=mask, other=0.0)
          x = x + y
          x = x * scale
          x = tl.maximum(x, lo)
          x = tl.minimum(x, hi)
          x = tl.maximum(x, 0.0)
          tl.store(out_ptr + offsets, x, mask=mask)
    expected_speedup: "1.2-3x (bandwidth dependent)"
    applies_to:
      - all_elementwise
      - normalization_epilogues

  - id: gemm_activation_fusion
    name: "GEMM + Activation Fusion (conditional)"
    stage: fusion
    description: "Fuse activation into GEMM ONLY when you already need a custom GEMM"
    rationale: |
      Fusion removes an intermediate write+read of the GEMM output. This is beneficial
      when you use a custom GEMM kernel. Fuse the activation into the GEMM epilogue
      by applying it on the accumulator in registers before tl.store.
    applies_when:
      - uses_custom_gemm: true
      - intermediate_materialized: true
    rejects_when:
      - epilogue_is_tiny: true
      - num_pid_m_le_1: true
    pattern_before: |
      # Kernel 1: GEMM (custom)
      @triton.jit
      def gemm_kernel(a_ptr, b_ptr, c_ptr, ...):
          acc = tl.dot(a, b)
          tl.store(c_ptr + offsets, acc, mask=mask)

      # Kernel 2: Activation (separate launch)
      @triton.jit
      def activation_kernel(c_ptr, out_ptr, ...):
          c = tl.load(c_ptr + offsets, mask=mask, other=0.0)
          out = tl.maximum(c, 0.0)  # ReLU
          tl.store(out_ptr + offsets, out, mask=mask)
    pattern_after: |
      # Single fused kernel (custom GEMM + activation epilogue)
      @triton.jit
      def fused_gemm_relu(a_ptr, b_ptr, out_ptr, ...):
          acc = tl.dot(a, b)
          acc = tl.maximum(acc, 0.0)  # ReLU
          tl.store(out_ptr + offsets, acc, mask=mask)
    expected_speedup: "workload-dependent (positive if avoiding a large materialized intermediate)"
    applies_to:
      - custom_gemm_only
      - mlp
      - transformer

  - id: gemm_bias_activation_fusion
    name: "GEMM + Bias + Activation Chain (partial fusion recommended)"
    stage: fusion
    description: "Fuse bias + light activation into GEMM epilogue; split heavy chains if needed"
    rationale: |
      Bias add + simple activations are often good epilogues. Very heavy activation chains
      (multiple exp/tanh/clamp) can increase register pressure and reduce occupancy.
      Prefer partial fusion when needed:
      - fuse bias + simple activation
      - keep heavy post-processing in a separate kernel
    applies_when:
      - uses_custom_gemm: true
      - intermediate_materialized: true
    rejects_when:
      - activation_chain_is_heavy: true
    pattern_before: |
      c = gemm(a, b)
      c = c + bias
      c = swish(c)
      c = clamp(c, -1, 1)
      c = tanh(c)
    pattern_after: |
      @triton.jit
      def fused_gemm_bias_activation(..., bias_ptr, out_ptr, ...):
          acc = tl.dot(a, b)
          bias = tl.load(bias_ptr + offs_n, mask=mask_n, other=0.0)
          acc = acc + bias[None, :]

          # Light activation epilogue (example: ReLU or SiLU)
          # ReLU:
          acc = tl.maximum(acc, 0.0)

          tl.store(out_ptr + offsets, acc, mask=mask)
      # If you truly need heavy chains (swish+clamp+tanh), consider splitting:
      # - fused GEMM+bias+swish
      # - separate clamp+tanh kernel
    expected_speedup: "workload-dependent"
    applies_to:
      - mlp
      - gelu
      - silu

  - id: reduction_elementwise_fusion
    name: "Reduction + Elementwise Fusion (usually good; watch pressure)"
    stage: fusion
    description: "Fuse reductions with subsequent broadcast elementwise ops"
    rationale: |
      Reductions followed by broadcast (softmax / layernorm / rmsnorm) often benefit from
      fusion because it avoids writing the reduction results (max/sum/mean/var) to memory.
      However, very large reductions or overly large blocks can increase register/shared
      usage. If performance regresses, consider a 2-stage approach.
    pattern_before: |
      # Compute max for numerical stability
      max_val = tl.max(x, axis=1)
      x_stable = x - max_val[:, None]
      # Compute exp
      exp_x = tl.exp(x_stable)
      # Sum for softmax denominator
      sum_exp = tl.sum(exp_x, axis=1)
      # Normalize
      softmax = exp_x / sum_exp[:, None]
    pattern_after: |
      max_val = tl.max(x, axis=1, keep_dims=True)
      x_stable = x - max_val
      exp_x = tl.exp(x_stable)
      sum_exp = tl.sum(exp_x, axis=1, keep_dims=True)
      softmax = exp_x / sum_exp
    expected_speedup: "1.2-3x (shape dependent)"
    applies_to:
      - softmax
      - layernorm
      - attention

  - id: fusion_skip_when_dead_or_constant
    name: "Skip fusion if the fused op is dead / constant / no-op"
    stage: fusion
    description: "Do not fuse operations that are provably redundant for the given workload"
    rationale: |
      If an op is effectively a no-op for the given constants/data distribution,
      fusion adds extra instructions without reducing memory traffic meaningfully.

      Examples:
      - clamp range is so wide it never triggers
      - min/max with a constant that is outside observed values
      - multiply by 1, add 0
    expected_speedup: "prevents regressions"
    applies_to:
      - all

  - id: gemm_matrix_add_epilogue
    name: "GEMM + matrix add (residual/bias matrix) epilogue fusion"
    stage: fusion
    description: "Load a full matrix D after the GEMM K-loop and add to accumulator before storing"
    rationale: |
      A common pattern is C = A @ B + D where D is a full [M, N] matrix (residual
      connection, bias broadcast, etc.). Fusing the matrix add into the GEMM epilogue
      avoids a separate kernel launch and an extra read+write of the [M, N] output.

      The epilogue is lightweight (one descriptor load + one add), so register pressure
      impact is minimal and this fusion is almost always a win when you already have a
      custom GEMM kernel.

      Works with both block pointers and tensor descriptors.
    pattern_before: |
      # Separate: GEMM then add
      c = matmul(a, b)           # writes [M, N] to memory
      c = c + d                  # reads [M, N] + [M, N], writes [M, N]
    pattern_after: |
      # Fused: add D inside GEMM epilogue (tensor descriptor variant)
      accumulator = tl.zeros((BLOCK_SIZE_M, BLOCK_SIZE_N), dtype=tl.float32)
      off_k = 0
      for _ in range(0, K, BLOCK_SIZE_K):
          a = a_desc.load([pid_m * BLOCK_SIZE_M, off_k])
          b = b_desc.load([off_k, pid_n * BLOCK_SIZE_N])
          accumulator += tl.dot(a, b)
          off_k += BLOCK_SIZE_K

      # Epilogue: load D tile and add
      d_desc = tl.make_tensor_descriptor(base=d_ptr, shape=(M, N),
                                         strides=(stride_dm, stride_dn),
                                         block_shape=(BLOCK_SIZE_M, BLOCK_SIZE_N))
      d = d_desc.load([pid_m * BLOCK_SIZE_M, pid_n * BLOCK_SIZE_N])
      c = accumulator + d

      c_desc = tl.make_tensor_descriptor(base=c_ptr, shape=(M, N),
                                         strides=(stride_cm, stride_cn),
                                         block_shape=(BLOCK_SIZE_M, BLOCK_SIZE_N))
      c_desc.store([pid_m * BLOCK_SIZE_M, pid_n * BLOCK_SIZE_N], c)
    expected_speedup: "eliminates one full [M, N] read+write pass"
    applies_to:
      - gemm
      - residual_add
      - bias_matrix
      - transformer
    notes: |
      - D can be the same dtype as the accumulator or a different dtype (Triton auto-casts)
      - For batched variants, create d_desc with base=d_ptr + batch_offset
      - This pattern extends to any lightweight elementwise epilogue (add, mul, clamp, relu)
        applied after the K-loop and before the store
  - id: fuse_gemm_activation_chain_in_registers
    name: "Fuse multi-step activation chains after GEMM in registers"
    stage: fusion
    description: "Compute chained activations (Swish, Tanh, GELU, Hardtanh, clamp, etc.) entirely in registers on the fp32 accumulator before storing."
    rationale: |
      Each activation is applied to the fp32 accumulator tile already in registers.
      No intermediate tensor is written to/from memory; the full epilogue is a single store.
      This is always a win when the activations are cheap relative to the GEMM.
    pattern_before: |
      # Separate kernels
      out1 = gemm_kernel(x, w, bias)      # writes [M,N] to HBM
      out2 = swish_kernel(out1)            # reads/writes [M,N]
      out3 = tanh_kernel(out2)             # reads/writes [M,N]
      out4 = gelu_kernel(out3)             # reads/writes [M,N]
      out5 = hardtanh_kernel(out4)         # reads/writes [M,N]
    pattern_after: |
      # Everything in the GEMM epilogue (fp32 acc)
      # --- Swish: x * sigmoid(x) ---
      sigmoid = 1.0 / (1.0 + tl.exp(-acc))
      acc = acc * sigmoid
      # --- Divide ---
      acc = acc * 0.5
      # --- Clamp [-1, 1] ---
      acc = tl.maximum(acc, -1.0)
      acc = tl.minimum(acc, 1.0)
      # --- Tanh via exp ---
      exp_2x = tl.exp(2.0 * acc)
      acc = (exp_2x - 1.0) / (exp_2x + 1.0)
      # --- Final clamp (Hardtanh) ---
      acc = tl.maximum(acc, -1.0)
      acc = tl.minimum(acc, 1.0)
      # Single fp16 store
      tl.store(c_bp, acc.to(tl.float16), boundary_check=(0, 1))
    examples:
      - file: 81_Gemm_Swish_Divide_Clamp_Tanh_Clamp.py
        note: "Swish -> /2 -> clamp -> tanh -> clamp fused into one GEMM epilogue"
      - file: 95_Matmul_Add_Swish_Tanh_GELU_Hardtanh.py
        note: "Four activation stages fused with bias-add and residual-add"

  - id: fuse_gemm_batchnorm_scale_inference
    name: "Fuse GEMM + BatchNorm (inference) + Scale into one kernel"
    stage: fusion
    description: "Apply BatchNorm normalization and a scalar scale in the GEMM epilogue using precomputed running mean/variance."
    rationale: |
      At inference, BatchNorm reduces to a per-channel affine: (x - mean) / sqrt(var + eps) * gamma + beta.
      All per-column stats (rm, rv, gamma, beta, scale) are 1D vectors loaded once per tile column and
      broadcast across the BLOCK_M rows — zero extra memory passes over the [M,N] data.
    pattern_before: |
      out_gemm = gemm(x, w, bias)          # [M, N] to HBM
      out_bn   = batchnorm(out_gemm, ...)  # reads [M, N]
      out      = out_bn * scale            # reads [M, N]
    pattern_after: |
      # In epilogue after K-loop (column stats loaded once per tile)
      offs_n  = col_start + tl.arange(0, BLOCK_N)
      mask_n  = offs_n < N
      rm      = tl.load(rm_ptr    + offs_n, mask=mask_n, other=0.0).to(tl.float32)
      rv      = tl.load(rv_ptr    + offs_n, mask=mask_n, other=0.0).to(tl.float32)
      g       = tl.load(gamma_ptr + offs_n, mask=mask_n, other=1.0).to(tl.float32)
      be      = tl.load(beta_ptr  + offs_n, mask=mask_n, other=0.0).to(tl.float32)
      invstd  = 1.0 / tl.sqrt(rv + EPS)
      acc = (acc - rm[None, :]) * invstd[None, :] * g[None, :] + be[None, :]
      s   = tl.load(scale_ptr).to(tl.float32)
      acc = acc * s
      tl.store(out_bp, acc.to(tl.float16), boundary_check=(0, 1))
    examples:
      - file: 39_Gemm_Scale_BatchNorm.py
        note: "4096x4096 GEMM fused with inference BN and per-channel scale"
      - file: 84_Gemm_BatchNorm_Scaling_Softmax.py
        note: "GEMM + BN + Scale followed by 2D-tiled Softmax as a separate kernel"

  - id: fuse_gemm_min_subtract_epilogue
    name: "Fuse GEMM + min-clamp + subtract as epilogue"
    stage: fusion
    description: "Apply tl.minimum and scalar subtraction to the fp32 accumulator before store."
    rationale: |
      min() and subtract are element-wise ops on the GEMM tile already in registers.
      Fusing eliminates a full [M,N] memory round-trip at essentially zero extra cost.
    pattern_before: |
      out = gemm(x, w, bias)
      out = torch.minimum(out, constant)
      out = out - constant
    pattern_after: |
      # Epilogue after K-loop
      acc = tl.minimum(acc, constant)
      acc = acc - constant
      tl.store(o_bp, acc.to(tl.float16), boundary_check=(0, 1))
    examples:
      - file: 68_Matmul_Min_Subtract.py
        note: "min(GEMM+bias, C) - C fused; constant passed as Python float to avoid device sync"

  - id: fuse_gemm_reduction_epilogue_with_atomics
    name: "Fuse GEMM tile + reduction (maxpool/sum/scale) using atomic adds"
    stage: fusion
    description: "Perform pairwise max-pool and row-sum reduction on each GEMM tile in-register, then atomic-add into a [M] output."
    rationale: |
      For workloads that ultimately reduce over N (pool → sum → scale), fusing the reduction
      into the GEMM kernel eliminates the [M,N] intermediate entirely. Each tile computes
      its partial row sum and atomically accumulates into the [M] output buffer.
      Requires pre-zeroed output (torch.zeros) for atomic safety.
    pattern_before: |
      logits = gemm(x, w, bias)          # [M, N] to HBM
      pooled = maxpool1d(logits, k=2)    # [M, N/2]
      sums   = pooled.sum(dim=1)         # [M]
      out    = sums * scale
    pattern_after: |
      # In kernel epilogue (per tile):
      acc_pairs = tl.reshape(acc, (BLOCK_M, BLOCK_N // 2, 2))
      pair_max  = tl.max(acc_pairs, axis=2)          # [BM, BN/2]
      row_sum   = tl.sum(pair_max, axis=1)           # [BM]
      row_sum   = row_sum * scale
      # Atomic accumulate (requires pre-zeroed output)
      out_acc   = torch.zeros((M,), device='xpu', dtype=torch.float32)
      tl.atomic_add(out_ptrs, row_sum, mask=mask_m)
    examples:
      - file: 55_Matmul_MaxPool_Sum_Scale.py
        note: "Full GEMM+bias+maxpool(k=2)+sum+scale fused; output pre-zeroed for atomic safety"

  - id: split_lse_into_separate_reduction_kernel
    name: "Split LogSumExp/Softmax into a dedicated reduction kernel"
    stage: fusion
    description: "Do NOT fuse row-wise LogSumExp or Softmax into the GEMM kernel when the GEMM parallelism would be lost."
    rationale: |
      LogSumExp/Softmax requires a full-row scan which conflicts with 2D GEMM tile parallelism.
      Fusing it forces serialization over N inside the GEMM tile.
      Better: GEMM writes logits to HBM, then a separate row-reduction kernel reads them once.
      The memory round-trip is accepted because it preserves M*N parallelism in the GEMM.
    pattern_before: |
      # Trying to fuse LSE inside GEMM kernel — serializes N scan
      @triton.jit
      def bad_fused_gemm_lse_kernel(...):
          # K-loop for GEMM
          for k in ...: ...
          # Then full-row reduction — needs all N columns, breaks tile parallelism
          row_max = tl.max(acc, axis=1)  # works only if full row fits in one tile
    pattern_after: |
      # Kernel 1: GEMM + sigmoid (2D parallel)
      gemm_bias_sigmoid_kernel[grid2d](A, Wt, bias1, inter, ...)
      # Kernel 2: GEMM (2D parallel)
      gemm_bias_kernel[grid2d](inter, W2t, bias2, logits, ...)
      # Kernel 3: LogSumExp (row-wise reduction)
      lse_kernel[grid_rows](logits, lse_out, ...)
    examples:
      - file: 45_Gemm_Sigmoid_LogSumExp.py
        note: "Two GEMM kernels + separate LSE reduction; 2D-parallel GEMM + 1D LSE kernel"
