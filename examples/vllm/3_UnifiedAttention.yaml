
inputs:
  query:
    shape: [TQ, QH, D]
    dtype: bfloat16
  key_cache:
    shape: [NB, BS, KH, D]
    dtype: bfloat16
  value_cache:
    shape: [NB, BS, KH, D]
    dtype: bfloat16

inits:
  - dim: QH
  - dim: KH
  - dim: D
  - dim: BS
  - dim: NS
  - dim: TQ
  - dim: MKV
  - dim: NB
  - dim: SW
  - dim: SCAP
  - dim: KQM

ci:
  - params: [query, key_cache, value_cache]
    dtype: bfloat16
    dims:
      QH: 8
      KH: 4
      D: 64
      BS: 16
      NS: 1
      TQ: 64
      MKV: 64
      NB: 32
      SW: 0
      SCAP: 0
      KQM: 0
    flop: "4*TQ*QH*D*MKV"

bench-gpu-1:
  # llama3.1-8B prefill (4k context)
  - params: [query, key_cache, value_cache]
    dtype: bfloat16
    dims:
      QH: 32
      KH: 8
      D: 128
      BS: 16
      NS: 1
      TQ: 4096
      MKV: 4096
      NB: 2048
      SW: 0
      SCAP: 0
      KQM: 0
    flop: "4*TQ*QH*D*MKV"

bench-gpu-2:
  # llama3.1-8B decode (8 sequences, 1 token each)
