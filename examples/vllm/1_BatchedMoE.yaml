
inputs:
  A:
    shape: [E, M, K]
    dtype: bfloat16
  B:
    shape: [E, N, K]
    dtype: bfloat16
  expert_num_tokens:
    shape: [E]
    dtype: int32
    range: [0, M]

inits:
  - dim: E
  - dim: M
  - dim: K
  - dim: N
  - dim: QUANT

ci:
  - params: [A, B, expert_num_tokens]
    dtype: bfloat16
    dims:
      E: 8
      M: 32
      K: 128
      N: 128
      QUANT: 0
    flop: "E*M*N*K*2"

bench-gpu-1:
  # gpt-oss 20b: input -> swiglu input
  - params: [A, B, expert_num_tokens]
    dtype: bfloat16
    dims:
      E: 32
      M: 64
      K: 2880
      N: 5760
      QUANT: 0
    flop: "E*M*N*K*2"

